apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql-statefulset
  namespace: capstone-ns

spec:
  selector:
    matchLabels:
      app: mysql

  serviceName: mysql-svc

  replicas: 1

  template:
    metadata:
      labels:
        app: mysql
    
    spec:
      containers:
      - name: mysql
        image: mysql:8.0

        envFrom:
        - secretRef:
            name: mysql-secret

        ports:
        - containerPort: 3306

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"

          limits:
            cpu: "500m"
            memory: "1Gi"

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage

    spec:
      accessModes: [ "ReadWriteOnce" ]
      
      resources:
        requests:
          storage: 1Gi
