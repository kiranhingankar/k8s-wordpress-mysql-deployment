apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: wordpress-hpa
  namespace: capstone-ns

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wordpress-deployment

  minReplicas: 2
  maxReplicas: 10
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
